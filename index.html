<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Clientes IPTV</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

h1{
    margin-bottom:20px;
    color:#38bdf8;
}

.topo{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.topo-clientes{
    display:flex;
    gap:10px;
}

.topo-clientes button{
    flex:1;
}

input, button{
    padding:12px;
    border:none;
    border-radius:10px;
}

input{
    background:#1e293b;
    color:white;
}

button{
    cursor:pointer;
    font-weight:bold;
}
.btn-lembrete{

    background:#22c55e;

    color:white;

    padding:10px 15px;

    border:none;

    border-radius:10px;

    font-weight:bold;

    cursor:pointer;
}
.btn-add{
    background:#22c55e;
    color:white;
}

.btn-whats{
    background:#25d366;
    color:white;
}

.btn-delete{
    background:#ef4444;
    color:white;
}

.btn-edit{
    background:#3b82f6;
    color:white;
}

.btn-vencendo{
    background:#f59e0b;
    color:black;
}

.btn-icon{

    width:45px;
    height:45px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;

    padding:0;
}

.btn-renovar{
    background:#22c55e;
    color:white;
}

.lista{
    display:grid;
    gap:15px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    border-left:5px solid #38bdf8;
}

.card.vencido{
    border-left:5px solid #ef4444;
}

.card.vencendo{
    border-left:5px solid #f59e0b;
}

.nome{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.info{
    margin:5px 0;
}

.acoes{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.status{
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.ativo{
    background:#22c55e;
    color:black;
}

.vencido-status{
    background:#ef4444;
    color:white;
}

.vencendo-status{
    background:#f59e0b;
    color:black;
}

@media(max-width:700px){
    .topo{
        flex-direction:column;
    }
    .topo-clientes{
        flex-direction:row !important;
    }
    .grupo-data-valor{
        width:100%;
    }
    .grupo-data-valor input{
        flex:1;
    }
}

.grupo-data-valor{
    display:flex;
    gap:10px;
}

.grupo-data-valor input{
    width:140px;
}
.menu-btn{
    position:fixed;
    top:10px;
    left:15px;
    width:50px;
    height:50px;
    background:#1e293b;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:12px;
    font-size:26px;
    cursor:pointer;
    z-index:5001;
    box-shadow:0 0 10px rgba(0,0,0,.3);
}

.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:250px;
    height:100vh;
    background:#111827;

    padding:90px 20px 20px 20px;

    transition:.3s;
    z-index:5000;
    overflow-y:auto;
}

.sidebar.ativo{
    left:0;
}

.sidebar h2{
    margin-bottom:30px;
    color:#38bdf8;
}

.sidebar button{
    width:100%;
    margin-bottom:10px;
    background:#1e293b;
    color:white;
    padding:15px;
    border-radius:12px;
    border:none;
    text-align:left;
}

.guia{
    display:none;
    padding-top:80px;
    position:relative;
    z-index:1;
}

.guia.ativa{
    display:block;
}

.cards-dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin:20px 0;
}

.dash-card{
    background:#1e293b;
    padding:20px;
    border-radius:16px;
}

.dash-card h3{
    margin-bottom:10px;
    color:#94a3b8;
}

.dash-card span{
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
}

.vencimentos-box{
    margin-top:30px;
    background:#1e293b;
    padding:20px;
    border-radius:16px;
}

.config-box{
    background:#1e293b;
    padding:20px;
    border-radius:16px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

select{
    background:#1e293b;
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
}
.plano-item{
    background:#0f172a;
    padding:15px;
    border-radius:12px;
    margin-top:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.plano-info{
    display:flex;
    flex-direction:column;
    gap:5px;
}

.plano-nome{
    font-weight:bold;
    color:#38bdf8;
}

.plano-valor{
    color:#94a3b8;
}
.modal{

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.6);

    display:none;

    align-items:center;
    justify-content:center;

    z-index:2000;
}

.modal.ativo{
    display:flex;
}

.modal-box{

    background:#111827;

    width:95%;
    max-width:450px;

    padding:25px;

    border-radius:20px;

    display:flex;
    flex-direction:column;

    gap:15px;

    animation:modalEntrada .25s ease;
}

@keyframes modalEntrada{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.modal-topo{

    display:flex;

    justify-content:space-between;

    align-items:center;
}

.fechar-modal{
    background:#ef4444;
    color:white;
    width:40px;
    height:40px;
    border-radius:10px;
    font-size:18px;
}

.filtros-clientes{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    overflow-x:auto;
}

.filtro-btn{
    background:#1e293b;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    white-space:nowrap;
}

.filtro-btn.ativo{
    background:#38bdf8;
    color:black;
}

#cabecalhoSistema{

    position:fixed;

    top:0;
    left:0;

    width:100%;

    height:70px;

    background:#111827;

    display:flex;

    align-items:center;
    justify-content:center;

    gap:12px;

    z-index:4000;

    box-shadow:0 2px 10px rgba(0,0,0,.3);
}

#logoSistema{

    width:45px;
    height:45px;

    object-fit:contain;
}

#tituloSistema{

    font-size:24px;
    font-weight:bold;

    color:#38bdf8;
}
.backup-acoes{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.backup-acoes button{
    flex:1;
}
#renovacaoNome,
#renovacaoAtual,
#renovacaoPlano{
    color:white;
}
#modalRenovacao .modal-box,
#modalRenovacao .modal-box *{
    color:white;
}
</style>
</head>
<body>
<div id="cabecalhoSistema">

    <img
        id="logoSistema"
        src=""

    <span id="tituloSistema">
        Gestor IPTV
    </span>

</div>
<!-- MENU -->

<div class="menu-btn" onclick="toggleMenu()">

</div>

<div class="sidebar" id="sidebar">

        Dashboard
    </button>

    </button>

    </button>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="guia ativa">

    <h1>📊 Dashboard</h1>

    <div class="cards-dashboard">

        <div class="dash-card">
            <h3>💰 Lucro Mensal</h3>
            <span id="lucroTotal">R$ 0,00</span>

</div>

<!-- CLIENTES -->

<div id="clientes" class="guia">

    <div class="topo topo-clientes">

    <button

</div>

<div

>

<!-- CONFIGURAÇÕES -->

<div id="configuracoes" class="guia">

<h2>Backup Completo</h2>

<div class="backup-acoes">

    <button
        class="btn-add"
        onclick="exportarSistema()"

        📤 Exportar Sistema
    </button>

        onchange="importarSistema(event)"

<h2>Dados PIX</h2>

<label>Chave PIX</label>
<input
    type="text"
    id="pixChave"

>

<label>Nome do Recebedor</label>
<input
    type="text"
    id="pixNome"

>

<input
    type="text"
    id="pixBanco"
    placeholder="Banco"
>

        <button class="btn-vencendo"
            onclick="salvarConfiguracoes()">
    
            Salvar Configurações
    
        </button>
    </div>

<script>
  // JS 
let filtroAtual = "todos";
let planoEditando = null;
let clienteEditando = null;
let servidores =
    JSON.parse(
        localStorage.getItem("servidores")
    ) || [

        {
            nome:"Genial",
            custo:"R$11,00"
        }

    ];
let planos = JSON.parse(localStorage.getItem("planos")) || [
    {
        nome:"Mensal 1 Tela",
        valor:30
    },

    {
        nome:"Mensal Econômico",
        valor:15
    },

    {
        nome:"Mensal 2 Telas",
        valor:50
    },

    {
        nome:"Trimestral",
        valor:75
    }
];

  // FUNCTION
function exportarSistema(){

    const backup = {

        clientes,

        planos,

        servidores,

        configuracoes:
            JSON.parse(
                localStorage.getItem("configuracoes")
            ) || {}

    };

    const blob =
        new Blob(
            [JSON.stringify(backup,null,2)],
            {type:"application/json"}
        );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

    a.href = url;

    a.download =
        "backup_completo_iptv.json";

    a.click();

    URL.revokeObjectURL(url);
}
function importarSistema(event){

    const arquivo =
        event.target.files[0];

    if(!arquivo){
        return;
    }

    const leitor =
        new FileReader();

    leitor.onload = function(e){

        try{

            const dados =
                JSON.parse(
                    e.target.result
                );

            if(
                !confirm(
                    "Isso substituirá todos os dados atuais. Continuar?"
                )
            ){
                return;
            }

            clientes =
                dados.clientes || [];

            planos =
                dados.planos || [];

            servidores =
                dados.servidores || [];

            localStorage.setItem(
                "clientes",
                JSON.stringify(clientes)
            );

            localStorage.setItem(
                "planos",
                JSON.stringify(planos)
            );

            localStorage.setItem(
                "servidores",
                JSON.stringify(servidores)
            );

            localStorage.setItem(
                "configuracoes",
                JSON.stringify(
                    dados.configuracoes || {}
                )
            );

            carregarConfiguracoes();

            renderizarServidores();

            renderizarPlanos();

            renderizar();

            atualizarDashboard();

            alert(
                "Backup restaurado com sucesso."
            );

        }catch(erro){

            alert(
                "Arquivo inválido."
            );
        }
    };

    leitor.readAsText(arquivo);
}
function atualizarCabecalho(){

    let config =
        JSON.parse(
            localStorage.getItem("configuracoes")
        ) || {};

    let titulo =
        document.getElementById("tituloSistema");

    titulo.innerText =
        config.nomeSistema || "Gestor IPTV";

    let logo =
        document.getElementById("logoSistema");

    if(config.logoSistema){

        logo.src =
            config.logoSistema;

        logo.style.display =
            "block";

    }else{

        logo.style.display =
            "none";
    }
}
function abrirModalRenovacao(index){

    clienteRenovacao = index;

    let cliente = clientes[index];

    document.getElementById("renovacaoNome").innerText =
        cliente.nome;

    document.getElementById("renovacaoAtual").innerText =
        formatarData(cliente.vencimento);

    document.getElementById("renovacaoPlano").innerHTML =
    `<strong>Plano:</strong> ${cliente.plano || "-"}`;

    document.getElementById("modalRenovacao")
        .classList.add("ativo");
}

function fecharModalRenovacao(){

    document.getElementById("modalRenovacao")
        .classList.remove("ativo");
}

function renovarCliente(){

    if(clienteRenovacao === null){
        return;
    }

    let cliente = clientes[clienteRenovacao];

    let dias = 30;

    let planoTexto =
        (cliente.plano || "").toLowerCase();

    if(planoTexto.includes("trimestral")){
        dias = 90;
    }

    if(planoTexto.includes("semestral")){
        dias = 180;
    }

    if(planoTexto.includes("anual")){
        dias = 365;
    }

    let dataBase;

    if(
        cliente.vencimento &&
        new Date(cliente.vencimento) > new Date()
    ){
        dataBase = new Date(cliente.vencimento);
    }else{
        dataBase = new Date();
    }

    dataBase.setDate(
        dataBase.getDate() + dias
    );

    clientes[clienteRenovacao].vencimento =
        dataBase.toISOString().split("T")[0];

    clientes[clienteRenovacao].ultimaRenovacao =
        new Date().toISOString().split("T")[0];

    salvar();

    renderizar();

    atualizarDashboard();

    enviarMensagemRenovacao(
        clientes[clienteRenovacao]
    );

    fecharModalRenovacao();
}
function enviarMensagemRenovacao(cliente){

    let valor = "";

    let match =
        cliente.plano.match(
            /R\$\s*([\d.,]+)/
        );

    if(match){
        valor = match[1];
    }

    let nomePlano =
        cliente.plano.split(" - ")[0];

    let mensagem =
`*✅ Renovação realizada ✅*

*🔰 Seguem seus dados de acesso:*

*✨️ Nome:* ${cliente.nome}
*✨️ Usuário:* ${cliente.usuario}
*✨️ Senha:* ${cliente.senha}

*🔸 Plano:* ${nomePlano}
*🔸 Valor:* R$ ${valor}

*🗓️ Vencimento:* ${formatarData(cliente.vencimento)}
*--------------------------------*
*📱 App Android:*
https://bit.ly/htvapkjmf
*📱 App iOS:*
https://apple.co/3Y1lv7G

*💵 INDIQUE E GANHE 💵*

Quando seu indicado assinar, você ganha *R$20,00 de desconto na próxima renovação 😱🤩*

*🧑‍💻 Att.* HyperTV, trazendo o melhor a você.`;
if(cliente.obs){

    let obsFormatado =
        cliente.obs.replace(/\\n/g, "\n");

    mensagem +=
`\n\n~~~~~~~~~~~~~~~~~~
${obsFormatado}`;
}

    let url =
`https://wa.me/${cliente.whatsapp}?text=${encodeURIComponent(mensagem)}`;

    window.open(url,"_blank");
}
function configurarUploadLogo(){

    let campoLogo =
        document.getElementById("logoUpload");

    if(!campoLogo){
        return;
    }

    campoLogo.addEventListener(
        "change",
        function(event){

            let arquivo =
                event.target.files[0];

            if(!arquivo){
                return;
            }

            let leitor =
                new FileReader();

            leitor.onload =
                function(e){

                    let config =
                        JSON.parse(
                            localStorage.getItem(
                                "configuracoes"
                            )
                        ) || {};

                    config.logoSistema =
                        e.target.result;

                    localStorage.setItem(
                        "configuracoes",
                        JSON.stringify(config)
                    );

                    atualizarCabecalho();
                };

            leitor.readAsDataURL(
                arquivo
            );
        }
    );
}
function toggleServidor(){

    let box =
        document.getElementById("boxServidor");

    if(box.style.display == "none"){

        box.style.display = "flex";

    }else{

        box.style.display = "none";
    }
}

function togglePlano(){

    let box =
        document.getElementById("boxPlano");

    if(box.style.display == "none"){

        box.style.display = "flex";

    }else{

        box.style.display = "none";
    }
}
function enviarDadosCliente(cliente){

    let mensagem =
`Ooi, ${cliente.nome}. Segue seus dados de acesso 📺

👤 Usuário: ${cliente.usuario}

🔑 Senha: ${cliente.senha}

📅 Vencimento: ${formatarData(cliente.vencimento)}

📦 Plano: ${cliente.plano}`;

function statusCliente(data){

    if(!data || !data.includes("-")){
        return "ativo";
    }

    let partes = data.split("-");

    if(partes.length < 3){
        return "ativo";
    }

    let venc = new Date(
        Number(partes[0]),
        Number(partes[1]) - 1,
        Number(partes[2])
    );

    if(isNaN(venc.getTime())){
        return "ativo";
    }

    let hoje = new Date();

    hoje.setHours(0,0,0,0);

    venc.setHours(0,0,0,0);

    let diff =
        Math.ceil(
            (venc - hoje)
            / (1000 * 60 * 60 * 24)
        );

    if(diff < 0){
        return "vencido";
    }

    if(diff <= 3){
        return "vencendo";
    }

    return "ativo";
}

function calcularDiasRestantes(data){

    let partes = data.split("-");

        partes[2]
    );

    let hoje = new Date();

    hoje.setHours(0,0,0,0);

    venc.setHours(0,0,0,0);

    let diff =
        Math.ceil(
            (venc - hoje)
            / (1000 * 60 * 60 * 24)
        );

    return diff;
}

<div class="modal" id="modalPlano">

    <div class="modal-box">

        <div class="modal-topo">

            <h2>Editar Plano</h2>

            <button class="fechar-modal"
                onclick="fecharModalPlano()">

                ✕

            </button>

        </div>

        <input
            type="text"
            id="editPlanoNome"
            placeholder="Nome do plano"

        <input
            type="text"
            id="editPlanoValor"
            placeholder="R$0,00"
            
        >

        <button class="btn-add"
            onclick="salvarEdicaoPlano()">

        </button>

</div>

    <div class="modal-box">

        <div class="modal-topo">

            <h2>Renovar Cliente</h2>

                class="fechar-modal"
                onclick="fecharModalRenovacao()"
            >
                ✕
            </button>

        </div>

        <strong id="renovacaoNome"></strong>

        <div>

            <span id="renovacaoAtual"></span>

            class="btn-add"
            onclick="renovarCliente()"
